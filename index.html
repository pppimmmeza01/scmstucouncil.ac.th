<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recycle Rewards - ระบบสะสมแต้ม</title>
    <style>
        :root {
            --primary-color: #a4e0a7;
            --secondary-color: #4caf50;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #e8f5e9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .user-info {
            background: #f1f8e9;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid var(--primary-color);
        }
        .score-box {
            font-size: 4rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 10px 0;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .status-success { background: #c8e6c9; color: #256029; }
        .status-error { background: #ffcdd2; color: #c62828; }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 1.1rem;
            font-weight: bold;
        }
        .btn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: var(--primary-color);">♻️ Recycle Rewards</h2>
    
    <div id="setup-section">
        <p>กรุณากรอกชื่อเพื่อเริ่มสะสมแต้ม</p>
        <input type="text" id="username" placeholder="ระบุชื่อของคุณที่นี่...">
        <button class="btn" onclick="registerUser()">เข้าสู่ระบบ</button>
    </div>

    <div id="main-section" style="display:none;">
        <div class="user-info">
            <span id="display-name" style="font-weight: bold;"></span>
        </div>
        
        <div id="status-msg" class="status-badge"></div>
        
        <p>คะแนนสะสมทั้งหมด</p>
        <div class="score-box" id="total-score">0</div>
        
        <p style="font-size: 0.8rem; color: #666;">* สแกน QR Code จากขวดน้ำเพื่อรับแต้มเพิ่ม</p>
    </div>
</div>

<script>
    // จำลองฐานข้อมูลใน LocalStorage (ในเครื่องผู้ใช้)
    let userData = JSON.parse(localStorage.getItem('recycleUser')) || null;

    // ตรวจสอบสถานะการเข้าสู่ระบบเมื่อโหลดหน้า
    window.onload = function() {
        if (userData) {
            showMainSection();
            processQRCode();
        }
    };

    function registerUser() {
        const name = document.getElementById('username').value;
        if (name.trim() === "") return alert("กรุณาใส่ชื่อ");
        
        userData = { name: name, score: 0, usedCodes: [] };
        saveData();
        showMainSection();
        processQRCode();
    }

    function showMainSection() {
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('main-section').style.display = 'block';
        document.getElementById('display-name').innerText = "ผู้เล่น: " + userData.name;
        updateScoreDisplay();
    }

    function processQRCode() {
        // ดึงค่า Code จาก URL เช่น ?code=BOT123
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const statusMsg = document.getElementById('status-msg');

        if (!code) {
            statusMsg.innerText = "รอสแกน QR Code";
            statusMsg.className = "status-badge";
            return;
        }

        // ตรวจสอบว่าโค้ดนี้เคยใช้ไปหรือยัง
        if (userData.usedCodes.includes(code)) {
            statusMsg.innerText = "❌ โค้ดนี้ถูกใช้งานไปแล้ว";
            statusMsg.className = "status-badge status-error";
        } else {
            // เพิ่มคะแนน (ขวดละ 10 แต้ม)
            userData.score += 10;
            userData.usedCodes.push(code);
            saveData();
            
            statusMsg.innerText = "✅ รับ 10 แต้มสำเร็จ! (ID: " + code + ")";
            statusMsg.className = "status-badge status-success";
            updateScoreDisplay();
        }
    }

    function updateScoreDisplay() {
        document.getElementById('total-score').innerText = userData.score;
    }

    function saveData() {
        localStorage.setItem('recycleUser', JSON.stringify(userData));
    }
</script>

</body>
</html>
